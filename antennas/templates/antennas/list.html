{% extends "antennas/base.html" %}
{% block title %}Antennas{% endblock %}
{% block content %}
    <style>
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

/* CARD */
.card {
    background: #020617;
    border: 1px solid #1e293b;
    border-radius: 14px;
    overflow: hidden;
    transition: 0.25s;
    text-align: center;
}

.card:hover {
    transform: translateY(-5px);
    border-color: #38bdf8;
}

/* IMAGE */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* CONTENT */
.card-body {
    padding: 15px;
}

.card h3 {
    margin: 10px 0;
}

.card p {
    font-size: 14px;
    color: #94a3b8;
}

/* BUTTON */
.card a {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 15px;
    background: #38bdf8;
    color: #020617;
    border-radius: 6px;
    font-weight: bold;
    transition: 0.2s;
}

.card a:hover {
    background: #0ea5e9;
}
    </style>
    <h1>Available Antennas</h1>
    <div class="grid">
        {% for antenna in antennas %}
            <div class="card">
                {% if antenna.image %}
                    <img src="{{ antenna.image.url }}">
                {% else %}
                    <img src="https://via.placeholder.com/300x180">
                {% endif %}
                <div class="card-body">
                    <h3>{{ antenna.name }}</h3>
                    <p>{{ antenna.type|title }}</p>
                    <a href="{{ antenna.get_absolute_url }}">Open</a>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock %}
