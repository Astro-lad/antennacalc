<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>
            {% block title %}AntennaCalc{% endblock %}
        </title>
        <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8fafc;
            color: #e2e8f0;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* NAVBAR */
        .navbar {
            background: #020617;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #38bdf8;
        }

        .nav-links a {
            margin-left: 20px;
            color: #cbd5f5;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: #38bdf8;
        }

        h1 {
            color: #000000;
        }

        /* MAIN */
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 30px;
        }


        /* FOOTER */
        .footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid #1e293b;
            color: #64748b;
            margin-top: 40px;
        }
        </style>
    </head>
    <body>
        <div class="navbar">
            <div class="logo">AntennaCalc</div>
            <div class="nav-links">
                <a href="{% url 'antennas:antennas_list' %}">Home</a>
            </div>
        </div>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">RF Engineering Tool</div>
    </body>
</html>
